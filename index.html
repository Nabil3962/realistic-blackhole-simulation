<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interstellar Black Hole</title>
<style>
*{
margin:0;
padding:0;
overflow:hidden;
box-sizing:border-box;
}

body{
background:black;
}

canvas{
display:block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

const stars = [];
const particles = [];

function cx(){ return canvas.width/2; }
function cy(){ return canvas.height/2; }

for(let i=0;i<2000;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
alpha:Math.random()
});
}

class Particle{
constructor(){
this.reset();
}

reset(){
this.angle=Math.random()*Math.PI*2;
this.radius=160+Math.random()*320;
this.speed=0.001+Math.random()*0.01;
this.size=Math.random()*2.5;
this.stretch=0.22+Math.random()*0.18;
this.color=`hsl(${20+Math.random()*40},100%,${50+Math.random()*30}%)`;
}

update(){
this.angle+=this.speed;
this.radius-=0.09;

if(this.radius<100){
this.reset();
}
}

render(){
const x=cx()+Math.cos(this.angle)*this.radius;
const y=cy()+Math.sin(this.angle)*(this.radius*this.stretch);

ctx.beginPath();
ctx.fillStyle=this.color;
ctx.shadowColor=this.color;
ctx.shadowBlur=25;
ctx.arc(x,y,this.size,0,Math.PI*2);
ctx.fill();
}
}

for(let i=0;i<6000;i++){
particles.push(new Particle());
}

function drawStars(){
for(const s of stars){
ctx.globalAlpha=s.alpha;
ctx.fillStyle='white';
ctx.fillRect(s.x,s.y,s.size,s.size);
}
ctx.globalAlpha=1;
}

function animate(){
ctx.fillStyle='rgba(0,0,0,0.12)';
ctx.fillRect(0,0,canvas.width,canvas.height);

// Background stars
 drawStars();

// Massive glow
const glow=ctx.createRadialGradient(cx(),cy(),50,cx(),cy(),400);
glow.addColorStop(0,'rgba(255,180,100,0.6)');
glow.addColorStop(0.2,'rgba(255,120,0,0.3)');
glow.addColorStop(0.5,'rgba(255,70,0,0.1)');
glow.addColorStop(1,'rgba(0,0,0,0)');

ctx.beginPath();
ctx.fillStyle=glow;
ctx.arc(cx(),cy(),400,0,Math.PI*2);
ctx.fill();

// Accretion disk
particles.forEach(p=>{
p.update();
p.render();
});

// Photon ring
ctx.beginPath();
ctx.strokeStyle='rgba(255,220,150,0.95)';
ctx.lineWidth=8;
ctx.shadowColor='orange';
ctx.shadowBlur=50;
ctx.arc(cx(),cy(),110,0,Math.PI*2);
ctx.stroke();

// Event horizon
const hole=ctx.createRadialGradient(cx(),cy(),20,cx(),cy(),110);
hole.addColorStop(0,'#000');
hole.addColorStop(1,'#050505');

ctx.beginPath();
ctx.fillStyle=hole;
ctx.shadowColor='black';
ctx.shadowBlur=150;
ctx.arc(cx(),cy(),105,0,Math.PI*2);
ctx.fill();

requestAnimationFrame(animate);
}

ctx.fillStyle='black';
ctx.fillRect(0,0,canvas.width,canvas.height);

animate();
</script>
</body>
</html>
